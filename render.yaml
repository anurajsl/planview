databases:
  - name: planview-db
    plan: free
    databaseName: planview
    user: planview
    postgresMajorVersion: "16"

services:
  - type: web
    name: planview-api
    plan: free
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        fromDatabase:
          name: planview-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: CORS_ORIGIN
        value: https://planview-web.onrender.com
      - key: REDIS_URL
        value: ""
      - key: EMAIL_PROVIDER
        value: log
      - key: APP_URL
        value: https://planview-web.onrender.com
  - type: web
    name: planview-web
    plan: free
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    envVars:
      - key: VITE_API_URL
        value: https://planview-api.onrender.com
      - key: VITE_WS_URL
        value: wss://planview-api.onrender.com
