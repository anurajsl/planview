services:
  # ─── PostgreSQL ───
  postgres:
    image: postgres:16-alpine
    container_name: planview-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: planview
      POSTGRES_USER: planview
      POSTGRES_PASSWORD: ${DB_PASSWORD:-planview_dev_secret_2026}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./apps/api/src/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planview"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    container_name: planview-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-planview_redis_dev}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-planview_redis_dev}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── API Server ───
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: planview-api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://planview:${DB_PASSWORD:-planview_dev_secret_2026}@postgres:5432/planview
      REDIS_URL: redis://:${REDIS_PASSWORD:-planview_redis_dev}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-planview_jwt_dev_secret_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-planview_refresh_dev_secret_change_in_production}
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/shared/src:/app/packages/shared/src

  # ─── Web App ───
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: planview-web
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:4000
      VITE_WS_URL: ws://localhost:4000
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./packages/shared/src:/app/packages/shared/src

volumes:
  pgdata:
  redisdata:
